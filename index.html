<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponta – Confirmação de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark-green: #0F3D3E;
      --lime: #A6CE39;
      --lime-dark: #8fb32e;
      --cream: #f5f3ed;
      --text: #1a2a2b;
      --muted: #5a7172;
      --border: #d6d0c4;
      --red: #c0392b;
      --yellow: #e67e22;
      --green: #27ae60;
      --card-bg: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* HEADER */
    header {
      background: var(--dark-green);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-mark {
      height: 32px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .logo-mark img {
      height: 32px;
      width: auto;
    }
    header h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    header span {
      color: var(--lime);
      font-size: 13px;
      font-weight: 400;
      margin-top: 1px;
      display: block;
    }

    /* CONTAINER */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* STEP: SELECT PERSON */
    .step-select {
      padding-top: 36px;
    }
    .step-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .step-select h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark-green);
      margin-bottom: 20px;
    }
    .person-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .person-btn {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--dark-green);
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .person-btn:hover {
      border-color: var(--lime);
      background: #f0f7e0;
      transform: translateY(-1px);
    }
    .person-btn.active {
      border-color: var(--lime);
      background: var(--lime);
      color: var(--dark-green);
    }

    /* FORM */
    #task-form { display: none; }
    #task-form.visible { display: block; }

    .form-header {
      padding: 28px 0 8px;
      border-bottom: 2px solid var(--lime);
      margin-bottom: 24px;
    }
    .form-header .who {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--lime-dark);
    }
    .form-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--dark-green);
      margin-top: 2px;
    }

    /* SECTION (BU) */
    .bu-section {
      margin-bottom: 10px;
    }
    .bu-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--cream);
      padding: 6px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* TASK CARD */
    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .task-card .priority {
      font-size: 13px;
      margin-bottom: 6px;
    }
    .task-card .client-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark-green);
      margin-bottom: 6px;
    }
    .task-card .description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    /* STATUS BUTTONS */
    .status-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .status-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 12px;
    }
    .status-btn {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      background: var(--cream);
      text-align: center;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .status-btn:hover { border-color: #999; }
    .status-btn.selected-sim    { background: #e8f8ef; border-color: var(--green);  color: var(--green);  font-weight: 600; }
    .status-btn.selected-proc   { background: #fff8e8; border-color: var(--yellow); color: var(--yellow); font-weight: 600; }
    .status-btn.selected-nao    { background: #fdf0ee; border-color: var(--red);    color: var(--red);    font-weight: 600; }
    .status-btn.selected-semres { background: #f0f0f0; border-color: #888;         color: #555;          font-weight: 600; }

    /* OBS */
    .obs-field {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--cream);
      resize: vertical;
      min-height: 60px;
      transition: border-color 0.15s;
      outline: none;
    }
    .obs-field:focus { border-color: var(--lime-dark); }
    .obs-field::placeholder { color: #aaa; }

    /* SUBMIT */
    .submit-wrap {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .submit-btn {
      width: 100%;
      background: var(--dark-green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .submit-btn:hover  { background: #0c3030; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* SUCCESS */
    #success-msg {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    #success-msg .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    #success-msg h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark-green);
      margin-bottom: 8px;
    }
    #success-msg p {
      color: var(--muted);
      font-size: 15px;
    }
  </style>
</head>

        { client: 'São Marcelo', desc: 'Verificar trocas de TAG que não estão funcionando no DS.', priority: '🔴' },
      ],
    },
  };

  const STATUS_OPTIONS = [
    { label: '✅ Sim, concluído',         value: 'Sim, concluído',         cls: 'selected-sim' },
    { label: '🔄 Não, ainda no processo', value: 'Não, ainda no processo', cls: 'selected-proc' },
    { label: '⏸️ Não, ainda não atuei',   value: 'Não, ainda não atuei',   cls: 'selected-nao' },
    { label: '📵 Não, sem resposta',       value: 'Não, sem resposta',      cls: 'selected-semres' },
  ];

  let selectedPerson = null;
  const selections = {}; // { "ClientName": { status, obs } }

  // ─── DATE ───────────────────────────────────────────────────────────────────
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

  // ─── SELECT PERSON ──────────────────────────────────────────────────────────
  function selectPerson(name) {
    selectedPerson = name;
    document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    buildForm(name);
    setTimeout(() => {
      document.getElementById('task-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // ─── BUILD FORM ─────────────────────────────────────────────────────────────
  function buildForm(name) {
    const personTasks = TASKS[name] || {};
    const container = document.getElementById('tasks-container');
    container.innerHTML = '';

    document.getElementById('form-who').textContent = name.toUpperCase();

    const hasTasks = Object.values(personTasks).some(arr => arr.length > 0);
    if (!hasTasks) {
      container.innerHTML = '<p style="color:var(--muted);padding:20px 0;">Nenhuma tarefa registrada para hoje.</p>';
      document.getElementById('task-form').classList.add('visible');
      return;
    }

    Object.entries(personTasks).forEach(([bu, tasks]) => {
      if (!tasks || tasks.length === 0) return;
      const section = document.createElement('div');
      section.className = 'bu-section';
      section.innerHTML = `<div class="bu-label">${bu}</div>`;

      tasks.forEach(task => {
        const key = `${name}__${bu}__${task.client}`;
        if (!selections[key]) selections[key] = { status: null, obs: '' };

        const card = document.createElement('div');
        card.className = 'task-card';

        const statusBtns = STATUS_OPTIONS.map((opt, i) =>
          `<button class="status-btn" data-key="${key}" data-idx="${i}" data-value="${opt.value}" data-cls="${opt.cls}"
            onclick="selectStatus('${key}', this)">${opt.label}</button>`
        ).join('');

        card.innerHTML = `
          <div class="priority">${task.priority}</div>
          <div class="client-name">${task.client}</div>
          <div class="description">${task.desc}</div>
          <div class="status-label">Esta tarefa foi concluída?</div>
          <div class="status-options">${statusBtns}</div>
          <textarea class="obs-field" placeholder="Complemento opcional (ex: cliente pediu para entrar em contato amanhã…)"
            oninput="selections['${key}'].obs = this.value" rows="2"></textarea>
        `;
        section.appendChild(card);
      });

      container.appendChild(section);
    });

    document.getElementById('task-form').classList.add('visible');
  }

  // ─── SELECT STATUS ──────────────────────────────────────────────────────────
  function selectStatus(key, btn) {
    const allBtns = document.querySelectorAll(`.status-btn[data-key="${key}"]`);
    allBtns.forEach(b => {
      b.classList.remove('selected-sim', 'selected-proc', 'selected-nao', 'selected-semres');
    });
    const cls = btn.getAttribute('data-cls');
    btn.classList.add(cls);
    selections[key].status = btn.getAttribute('data-value');
  }

  // ─── SUBMIT ─────────────────────────────────────────────────────────────────
  async function submitForm() {
    const personTasks = TASKS[selectedPerson] || {};
    const hasTasks = Object.values(personTasks).some(arr => arr.length > 0);

    if (hasTasks) {
      const incomplete = Object.entries(selections).filter(([k, v]) =>
        k.startsWith(selectedPerson + '__') && !v.status
      );
      if (incomplete.length > 0) {
        alert(`Por favor, responda todas as tarefas antes de enviar. (${incomplete.length} sem resposta)`);
        return;
      }
    }

    // Build payload for Web3Forms
    const lines = [];
    Object.entries(TASKS[selectedPerson] || {}).forEach(([bu, tasks]) => {
      tasks.forEach(task => {
        const key = `${selectedPerson}__${bu}__${task.client}`;
        const s = selections[key] || {};
        lines.push(`[${bu}] ${task.client}: ${s.status || '—'}${s.obs ? ' | Obs: ' + s.obs : ''}`);
      });
    });

    const payload = {
      access_key: 'dfaba7b3-dcd0-40ba-af15-a5620f2257af',
      subject: `Daily Ponta – ${selectedPerson} – ${now.toLocaleDateString('pt-BR')}`,
      name: selectedPerson,
      email: 'daily@ponta.com.br',
      Responsavel: selectedPerson,
      Data: now.toLocaleDateString('pt-BR'),
      Respostas: lines.join('\n'),
    };

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (res.ok) {
        document.getElementById('step-select').style.display = 'none';
        document.getElementById('task-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        alert('Erro ao enviar. Tente novamente ou contacte o Paulo.');
      }
    } catch (e) {
      alert('Sem conexão. Verifique sua internet e tente novamente.');
    }
  }
</script>
</body>
</html>
